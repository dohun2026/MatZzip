<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛ZIP</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--sf:#1a1a1a;--sf2:#222;--sf3:#2a2a2a;
  --bd:#2e2e2e;--bd2:#3a3a3a;
  --ac:#ff5c35;--ac2:#ffb800;--gn:#3ddc84;--bl:#4d9fff;
  --tx:#f0ece4;--tm:#7a7570;--ts:#aaa49a;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

.nav{position:sticky;top:0;z-index:100;background:rgba(15,15,15,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;}
.logo{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--ac);letter-spacing:-1px;}
.logo span{color:var(--ac2);}
.spacer{flex:1;}
.mbadge{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  background:var(--sf2);border:1px solid var(--bd);padding:4px 10px;border-radius:20px;color:var(--tm);}
.mbadge.admin{border-color:var(--ac);color:var(--ac);}
.mbadge.editor{border-color:var(--ac2);color:var(--ac2);}
.nbtn{background:var(--ac);color:#fff;border:none;cursor:pointer;padding:7px 16px;border-radius:8px;
  font-size:13px;font-weight:700;font-family:inherit;transition:opacity .15s;white-space:nowrap;}
.nbtn:hover{opacity:.85;}
.nbtn.ghost{background:var(--sf2);border:1px solid var(--bd);color:var(--ts);}

.splash{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:36px;padding:32px;}
.sp-title{font-size:clamp(36px,7vw,56px);font-weight:900;line-height:1;text-align:center;}
.sp-title span{color:var(--ac);}
.sp-sub{color:var(--tm);font-size:15px;text-align:center;line-height:1.7;}
.sp-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%;max-width:600px;}
.sp-card{flex:1;min-width:148px;max-width:200px;background:var(--sf);border:2px solid var(--bd);
  border-radius:var(--r);padding:26px 18px;cursor:pointer;transition:border-color .2s,transform .15s;
  display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;}
.sp-card:hover{border-color:var(--ac);transform:translateY(-3px);}
.sp-card .ic{font-size:34px;}
.sp-card h3{font-size:15px;font-weight:700;}
.sp-card p{font-size:11px;color:var(--tm);line-height:1.5;}

.app{display:none;flex-direction:column;min-height:100vh;}
.app.on{display:flex;}
.main{flex:1;padding:20px;max-width:960px;margin:0 auto;width:100%;}

.fbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.sw{flex:1;min-width:200px;position:relative;}
.sw input{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-family:inherit;
  font-size:14px;padding:10px 14px 10px 38px;border-radius:10px;outline:none;transition:border-color .15s;}
.sw input:focus{border-color:var(--ac);}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tm);pointer-events:none;}
.ftag{background:var(--sf2);border:1px solid var(--bd);color:var(--ts);font-size:12px;font-weight:500;
  padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.ftag.on{background:var(--ac);border-color:var(--ac);color:#fff;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;
  cursor:pointer;transition:border-color .2s,transform .15s;display:flex;flex-direction:column;}
.card:hover{border-color:#444;transform:translateY(-2px);}
.cimg{height:160px;background:var(--sf2);display:flex;align-items:center;justify-content:center;
  font-size:48px;overflow:hidden;position:relative;flex-shrink:0;}
.cimg img{width:100%;height:100%;object-fit:cover;}
.cimg .icnt{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;
  font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px;}
.cbody{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:7px;}
.ctags{display:flex;gap:5px;flex-wrap:wrap;}
.ct{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--sf2);color:var(--tm);border:1px solid var(--bd);}
.ct.op{background:rgba(61,220,132,.1);color:var(--gn);border-color:rgba(61,220,132,.3);}
.ct.cl{background:rgba(255,92,53,.1);color:var(--ac);border-color:rgba(255,92,53,.3);}
.cname{font-size:17px;font-weight:700;line-height:1.3;}
.caddr{font-size:12px;color:var(--tm);}
.cmemo{font-size:12px;color:var(--ts);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.empty{text-align:center;padding:80px 20px;color:var(--tm);grid-column:1/-1;}
.rinfo{font-size:13px;color:var(--tm);margin-bottom:14px;}
.rinfo b{color:var(--tx);}

.ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.78);display:flex;
  align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.on{opacity:1;pointer-events:all;}
.modal{background:var(--sf);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:780px;
  max-height:93vh;overflow-y:auto;padding:24px 20px 48px;transform:translateY(40px);transition:transform .25s;}
.ov.on .modal{transform:translateY(0);}
@media(min-width:640px){.ov{align-items:center;}.modal{border-radius:var(--r);max-height:88vh;}}
.mhdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.mhdr h2{font-size:20px;font-weight:700;flex:1;}
.mclose{background:var(--sf2);border:1px solid var(--bd);color:var(--tm);width:32px;height:32px;
  border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

.dp-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
.dp{width:160px;height:110px;flex-shrink:0;border-radius:8px;border:1px solid var(--bd);
  overflow:hidden;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:32px;}
.dp img{width:100%;height:100%;object-fit:cover;}
.dsec{margin-bottom:14px;}
.dlb{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tm);margin-bottom:7px;}
.dv{font-size:14px;color:var(--ts);line-height:1.6;}
.hg{display:grid;grid-template-columns:60px 1fr;gap:3px 10px;font-size:13px;}
.hd{color:var(--tm);font-weight:500;}
.ht{color:var(--ts);}
.hd.td{color:var(--ac2);font-weight:700;}
.ht.td{color:var(--tx);font-weight:700;}
.dact{display:flex;gap:8px;margin-top:18px;}
.dact a{flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--ts);text-decoration:none;
  padding:10px;border-radius:8px;text-align:center;font-size:13px;font-weight:500;transition:all .15s;}
.dact a:hover{border-color:var(--ac);color:var(--ac);}
.delbtn{background:rgba(255,92,53,.08);border:1px solid rgba(255,92,53,.25);color:var(--ac);
  padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  transition:all .15s;width:100%;margin-top:10px;}
.delbtn:hover{background:rgba(255,92,53,.18);}
.editbtn{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.3);color:var(--ac2);
  padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  transition:all .15s;width:100%;margin-top:10px;}
.editbtn:hover{background:rgba(255,184,0,.18);}
.editbtn{background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.3);color:var(--ac2);
  padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
  transition:all .15s;width:100%;margin-top:8px;}
.editbtn:hover{background:rgba(255,184,0,.18);}

/* ── FORM ── */
.fsec{margin-bottom:18px;}
.flb{font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:8px;}
.req{color:var(--ac);}
.opt{color:var(--tm);font-weight:400;text-transform:none;letter-spacing:0;}
.fi,.fta{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  font-family:inherit;font-size:14px;padding:10px 14px;border-radius:10px;outline:none;transition:border-color .15s;}
.fi:focus,.fta:focus{border-color:var(--ac);}
.fta{resize:vertical;min-height:72px;line-height:1.6;}
.fdiv{border:none;border-top:1px solid var(--bd);margin:20px 0;}

/* 카테고리 */
.cat-btns{display:flex;gap:8px;flex-wrap:wrap;}
.catb{background:var(--sf2);border:2px solid var(--bd);color:var(--ts);font-family:inherit;
  font-size:13px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;transition:all .15s;}
.catb:hover{border-color:var(--bd2);}
.catb.on{background:rgba(255,92,53,.1);border-color:var(--ac);color:var(--tx);}

/* 사진 */
.pdrop{border:2px dashed var(--bd);border-radius:10px;padding:20px;text-align:center;
  cursor:pointer;transition:border-color .15s;color:var(--tm);font-size:14px;}
.pdrop:hover{border-color:var(--ac);}
.ppreviews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.ppw{position:relative;}
.pp{width:76px;height:57px;border-radius:6px;object-fit:cover;border:1px solid var(--bd);display:block;}
.ppr{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--ac);
  color:#fff;border:none;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sbtn{width:100%;background:var(--ac);color:#fff;border:none;cursor:pointer;padding:13px;
  border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;transition:opacity .15s;margin-top:8px;}
.sbtn:hover{opacity:.9;}

/* ── 영업시간 공통 ── */
.ht-wrap{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
.ht-presets{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:6px;}
.hpb{background:var(--sf3);border:1px solid var(--bd2);color:var(--ts);font-family:inherit;
  font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .15s;}
.hpb:hover{border-color:var(--ac2);color:var(--ac2);}
.hpb.special{border-color:rgba(255,92,53,.3);color:var(--ac);}
.hpb.special:hover{background:rgba(255,92,53,.1);}

/* ── PC: 가로 시간표 (680px 이상) ── */
@media(min-width:680px){
  .ht-grid{display:grid;grid-template-columns:36px repeat(7,minmax(0,1fr));}
  .ht-hdr{background:var(--sf3);}
  .ht-cell{padding:6px 2px;text-align:center;font-size:10px;font-weight:700;color:var(--tm);border-bottom:1px solid var(--bd);}
  .ht-cell.day-hdr{color:var(--ts);}
  .ht-cell.day-hdr.sat{color:#7ab4ff;}
  .ht-cell.day-hdr.sun{color:#ff8a70;}
  .ht-cell.today-hdr{color:var(--ac2);}
  .ht-label{padding:8px 4px;display:flex;align-items:center;justify-content:flex-end;
    font-size:10px;color:var(--tm);border-bottom:1px solid var(--bd);}
  .ht-input-cell{padding:3px 2px;border-bottom:1px solid var(--bd);border-left:1px solid var(--bd);
    display:flex;align-items:center;justify-content:center;}
  .ht-time{width:100%;background:var(--sf3);border:1px solid transparent;color:var(--tx);
    font-family:inherit;font-size:10px;padding:5px 1px;border-radius:5px;
    outline:none;text-align:center;cursor:pointer;transition:all .15s;}
  .ht-time:focus{border-color:var(--ac);background:var(--sf);}
  .ht-time:disabled{color:var(--tm);background:transparent;cursor:default;}
  .ht-off-cell{padding:3px 2px;border-bottom:1px solid var(--bd);border-left:1px solid var(--bd);
    display:flex;align-items:center;justify-content:center;}
  .ht-off-btn{width:100%;background:transparent;border:1px solid var(--bd2);color:var(--tm);
    font-family:inherit;font-size:10px;font-weight:700;padding:4px 1px;border-radius:5px;
    cursor:pointer;transition:all .15s;white-space:nowrap;}
  .ht-off-btn:hover{border-color:var(--ac);color:var(--ac);}
  .ht-off-btn.active{background:rgba(255,92,53,.12);border-color:var(--ac);color:var(--ac);}
  .ht-input-cell.today,.ht-off-cell.today{background:rgba(255,184,0,.04);}
  /* 모바일 카드 숨김 */
  .ht-cards{display:none;}
}

/* ── 모바일: 세로 카드형 (680px 미만) ── */
@media(max-width:679px){
  .ht-grid{display:none;}
  .ht-cards{display:flex;flex-direction:column;gap:1px;}
  .ht-card{display:grid;grid-template-columns:36px 1fr 1fr 64px;align-items:center;gap:6px;
    padding:10px 12px;border-bottom:1px solid var(--bd);transition:opacity .2s;}
  .ht-card:last-child{border-bottom:none;}
  .ht-card.off-day{opacity:.45;}
  .ht-card-day{font-size:13px;font-weight:700;color:var(--ts);text-align:center;}
  .ht-card-day.sat{color:#7ab4ff;}
  .ht-card-day.sun{color:#ff8a70;}
  .ht-card-day.today{color:var(--ac2);}
  .ht-card-time{background:var(--sf3);border:1px solid var(--bd2);color:var(--tx);
    font-family:inherit;font-size:13px;padding:7px 8px;border-radius:8px;
    outline:none;width:100%;text-align:center;cursor:pointer;transition:border-color .15s;}
  .ht-card-time:focus{border-color:var(--ac);}
  .ht-card-time:disabled{color:var(--tm);cursor:default;}
  .ht-card-off{background:transparent;border:1px solid var(--bd2);color:var(--tm);
    font-family:inherit;font-size:12px;font-weight:700;padding:7px 6px;border-radius:8px;
    cursor:pointer;transition:all .15s;width:100%;text-align:center;}
  .ht-card-off:hover{border-color:var(--ac);color:var(--ac);}
  .ht-card-off.active{background:rgba(255,92,53,.12);border-color:var(--ac);color:var(--ac);}
}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:12px 20px;
  border-radius:10px;font-size:14px;font-weight:500;z-index:999;
  transition:transform .25s,opacity .25s;opacity:0;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--gn);color:var(--gn);}
.toast.err{border-color:var(--ac);color:var(--ac);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div style="text-align:center">
    <div class="sp-title">맛<span>ZIP</span></div>
    <div class="sp-sub" style="margin-top:10px">현장 이동 중, 주변 맛집을 한눈에<br>권한을 선택해주세요</div>
  </div>
  <div class="sp-cards">
    <div class="sp-card" onclick="enter('viewer')"><div class="ic">🗺️</div><h3>일반 직원</h3><p>맛집 조회 및<br>카테고리 필터</p></div>
    <div class="sp-card" onclick="enter('editor')"><div class="ic">✏️</div><h3>등록 직원</h3><p>맛집 신규 등록<br>(허가된 직원)</p></div>
    <div class="sp-card" onclick="enter('admin')"><div class="ic">🔑</div><h3>관리자</h3><p>맛집 삭제 및<br>전체 관리</p></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="nav">
    <div class="logo">맛<span>ZIP</span></div>
    <span class="mbadge" id="mbadge"></span>
    <div class="spacer"></div>
    <button class="nbtn" id="addBtn" onclick="openReg()" style="display:none">+ 등록</button>
    <button class="nbtn ghost" onclick="goSplash()">모드 변경</button>
  </nav>
  <div class="main">
    <div class="fbar">
      <div class="sw"><span class="si">🔍</span><input type="text" id="sq" placeholder="식당 이름, 메모 검색..." oninput="render()"></div>
    </div>
    <div class="fbar" style="margin-top:-4px">
      <span class="ftag on" onclick="setF('all',this)">전체</span>
      <span class="ftag" onclick="setF('open',this)">🟢 영업중</span>
      <span class="ftag" onclick="setF('korean',this)">🍚 한식</span>
      <span class="ftag" onclick="setF('chinese',this)">🥟 중식</span>
      <span class="ftag" onclick="setF('japanese',this)">🍱 일식</span>
      <span class="ftag" onclick="setF('western',this)">🍝 양식</span>
      <span class="ftag" onclick="setF('cafe',this)">☕ 카페</span>
      <span class="ftag" onclick="setF('etc',this)">🍽️ 기타</span>
    </div>
    <div class="rinfo" id="rinfo"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="ov" id="dov" onclick="closeM('dov')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdr"><h2 id="dname"></h2><button class="mclose" onclick="closeM('dov')">✕</button></div>
    <div id="dcont"></div>
  </div>
</div>

<!-- REGISTER -->
<div class="ov" id="rov" onclick="closeM('rov')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhdr"><h2 id="regTitle">맛집 등록</h2><button class="mclose" onclick="closeM('rov')">✕</button></div>

    <!-- 카테고리 -->
    <div class="fsec">
      <label class="flb">카테고리 <span class="req">*</span></label>
      <div class="cat-btns">
        <button class="catb on" data-cat="korean" onclick="selCat(this)">🍚 한식</button>
        <button class="catb" data-cat="chinese" onclick="selCat(this)">🥟 중식</button>
        <button class="catb" data-cat="japanese" onclick="selCat(this)">🍱 일식</button>
        <button class="catb" data-cat="western" onclick="selCat(this)">🍝 양식</button>
        <button class="catb" data-cat="cafe" onclick="selCat(this)">☕ 카페</button>
        <button class="catb" data-cat="etc" onclick="selCat(this)">🍽️ 기타</button>
      </div>
    </div>

    <!-- 식당 이름 -->
    <div class="fsec">
      <label class="flb">식당 이름 <span class="req">*</span></label>
      <input class="fi" id="rName" type="text" placeholder="예) 둥지감자탕 흥업점">
    </div>

    <!-- 주소 — 직접 입력 -->
    <div class="fsec">
      <label class="flb">주소 <span class="req">*</span></label>
      <input class="fi" id="rAddr" type="text" placeholder="예) 강원특별자치도 원주시 흥업면 매지리 123" style="margin-bottom:8px">
      <input class="fi" id="rAddrDetail" type="text" placeholder="상세주소 (선택 — 건물명, 층 등)">
    </div>

    <!-- 연락처 -->
    <div class="fsec">
      <label class="flb">연락처</label>
      <input class="fi" id="rPhone" type="tel" placeholder="예) 033-000-0000 / 070-0000-0000"
        oninput="fmtPhone(this)" maxlength="14">
    </div>

    <hr class="fdiv">

    <!-- ── 영업시간 시간표 ── -->
    <div class="fsec">
      <label class="flb">영업시간</label>
      <div class="ht-wrap">
        <!-- 프리셋 -->
        <div class="ht-presets">
          <button class="hpb" onclick="apAll('09:00','22:00')">09~22시</button>
          <button class="hpb" onclick="apAll('10:00','21:00')">10~21시</button>
          <button class="hpb" onclick="apAll('11:00','21:00')">11~21시</button>
          <button class="hpb" onclick="apAll('11:00','22:00')">11~22시</button>
          <button class="hpb" onclick="apAll('11:30','20:30')">11:30~20:30</button>

          <button class="hpb special" onclick="apOffWeekend(false)">주말 휴무</button>
          <button class="hpb special" onclick="apOffWeekend(true)">일요일만 휴무</button>
          <button class="hpb special" onclick="apOffWed()">수요일 휴무</button>
        </div>
        <!-- PC: 가로 시간표 -->
        <div class="ht-grid" id="htGrid"></div>
        <!-- 모바일: 세로 카드 -->

      </div>
    </div>

    <hr class="fdiv">

    <!-- 사진 -->
    <div class="fsec">
      <label class="flb">사진 <span class="opt">(여러 장, 최대 6장)</span></label>
      <div class="pdrop" onclick="document.getElementById('photoIn').click()">📸 탭하여 사진 추가</div>
      <input type="file" id="photoIn" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">
      <div class="ppreviews" id="pprev"></div>
    </div>

    <!-- 메모 -->
    <div class="fsec">
      <label class="flb">메모</label>
      <textarea class="fta" id="rMemo" placeholder="추천 메뉴, 주차 정보, 주의사항 등 자유롭게..."></textarea>
    </div>

    <button class="sbtn" onclick="editingId?submitEdit():submitReg()">등록하기 ✓</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbzwnn4saGzc4Ba7rXmMyq4iL2Zg2YIrzqohr4OQ-BLYWdm_r7vl6ytuFtlxMdPRh0L1/exec';
const DAYS=['월','화','수','목','금','토','일'];
const DK=['mon','tue','wed','thu','fri','sat','sun'];
const CE={korean:'🍚',chinese:'🥟',japanese:'🍱',western:'🍝',cafe:'☕',etc:'🍽️'};
const CL={korean:'한식',chinese:'중식',japanese:'일식',western:'양식',cafe:'카페',etc:'기타'};

let mode='viewer', rests=[], filt='all', photos=[], selCatVal='korean';

// ── 로딩바 ─────────────────────────────────────────
function showLoading(on){
  let el=document.getElementById('loadingBar');
  if(!el){
    el=document.createElement('div');el.id='loadingBar';
    el.style.cssText='position:fixed;top:0;left:0;width:100%;height:3px;background:var(--ac);z-index:9999;transition:opacity .4s;';
    document.body.appendChild(el);
  }
  el.style.opacity=on?'1':'0';
}

// ── INIT: Sheets에서 데이터 로드 ──────────────────
async function init(){

  buildHtGrid();
  showLoading(true);
  try{
    const res=await fetch(API+'?action=getAll');
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    rests=data.rests||[];
  }catch(e){
    console.error(e);
    toast('데이터 불러오기 실패. 네트워크를 확인해주세요.','err');
    rests=[];
  }finally{
    showLoading(false);
    render();
  }
}

// ── MODE ──────────────────────────────────────────
let _inited=false;
function enter(m){
  mode=m;
  document.getElementById('splash').style.display='none';
  document.getElementById('app').classList.add('on');
  const b=document.getElementById('mbadge'),ab=document.getElementById('addBtn');
  const map={viewer:['조회 모드',''],editor:['등록 모드','editor'],admin:['관리자 모드','admin']};
  b.textContent=map[m][0]; b.className='mbadge '+map[m][1];
  ab.style.display=(m!=='viewer')?'':'none';
  if(!_inited){_inited=true;init();}else{render();}
}
function goSplash(){
  document.getElementById('splash').style.display='flex';
  document.getElementById('app').classList.remove('on');
}

// ── FILTER / RENDER ───────────────────────────────
function setF(f,el){
  filt=f;
  document.querySelectorAll('.ftag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on'); render();
}
function isOpen(h){
  const now=new Date(),di=(now.getDay()+6)%7,t=h[DK[di]];
  if(!t||t==='휴무')return false;
  const p=t.split('-');if(p.length<2)return false;
  const[oh,om]=p[0].split(':').map(Number),[ch,cm]=p[1].split(':').map(Number);
  const mn=now.getHours()*60+now.getMinutes();
  return mn>=oh*60+om&&mn<=ch*60+cm;
}
function render(){
  const q=document.getElementById('sq').value.toLowerCase();
  let list=rests.filter(x=>{
    if(q&&!x.name.toLowerCase().includes(q)&&!(x.memo||'').toLowerCase().includes(q))return false;
    if(filt!=='all'&&filt!=='open'&&x.category!==filt)return false;
    if(filt==='open'&&!isOpen(x.hours))return false;
    return true;
  });
  document.getElementById('rinfo').innerHTML=`총 <b>${list.length}</b>곳`;
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML=`<div class="empty"><div style="font-size:48px;margin-bottom:16px">🍽️</div><h3 style="color:var(--ts)">등록된 맛집이 없어요</h3><p style="font-size:13px;color:var(--tm);margin-top:8px">+ 등록 버튼으로 첫 맛집을 추가해보세요</p></div>`;return;}
  g.innerHTML=list.map(x=>{
    const op=isOpen(x.hours);
    return `<div class="card" onclick="openD('${x.id}')">
      <div class="cimg">${x.photos&&x.photos.length?`<img src="${x.photos[0]}">`:`<span>${CE[x.category]||'🍽️'}</span>`}${x.photos&&x.photos.length>1?`<div class="icnt">📷${x.photos.length}</div>`:''}</div>
      <div class="cbody">
        <div class="ctags"><span class="ct">${CE[x.category]} ${CL[x.category]}</span><span class="ct ${op?'op':'cl'}">${op?'영업중':'영업종료'}</span></div>
        <div class="cname">${x.name}</div>
        <div class="caddr">📍 ${x.address}${x.addrDetail?' '+x.addrDetail:''}</div>
        ${x.memo?`<div class="cmemo">${x.memo}</div>`:''}
      </div></div>`;
  }).join('');
}

// ── DETAIL ────────────────────────────────────────
function openD(id){
  const x=rests.find(r=>r.id===id);if(!x)return;
  document.getElementById('dname').textContent=x.name;
  const op=isOpen(x.hours),ti=(new Date().getDay()+6)%7;
  const ph=x.photos&&x.photos.length?x.photos.map(p=>`<div class="dp"><img src="${p}"></div>`).join(''):`<div class="dp">${CE[x.category]||'🍽️'}</div>`;
  const hh=DAYS.map((d,i)=>{const k=DK[i],t=x.hours[k]||'정보없음',td=i===ti;return`<span class="hd ${td?'td':''}">${d}${td?' ●':''}</span><span class="ht ${td?'td':''}">${t}</span>`;}).join('');
  const fullAddr=x.addrDetail?`${x.address} ${x.addrDetail}`:x.address;
  document.getElementById('dcont').innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:14px"><span class="ct">${CE[x.category]} ${CL[x.category]}</span><span class="ct ${op?'op':'cl'}">${op?'🟢 영업중':'🔴 영업종료'}</span></div>
    <div class="dp-row">${ph}</div>
    <div class="dsec"><div class="dlb">주소</div><div class="dv">${fullAddr}</div></div>
    ${x.phone?`<div class="dsec"><div class="dlb">연락처</div><div class="dv">${x.phone}</div></div>`:''}
    <div class="dsec"><div class="dlb">영업시간</div><div class="hg">${hh}</div></div>
    ${x.memo?`<div class="dsec"><div class="dlb">메모</div><div class="dv">${x.memo}</div></div>`:''}
    <div class="dact">
      <a href="https://map.kakao.com/link/search/${encodeURIComponent(fullAddr)}" target="_blank">🗺️ 카카오맵</a>
      ${x.phone?`<a href="tel:${x.phone.replace(/-/g,'')}">📞 전화</a>`:''}
    </div>
    ${(mode==='admin'||mode==='editor')?`<button class="editbtn" onclick="openEdit('${x.id}')">✏️ 수정하기</button>`:''}
    ${mode==='admin'?`<button class="delbtn" onclick="delR('${x.id}')">🗑️ 이 맛집 삭제</button>`:''}`;
  openM('dov');
}
async function delR(id){
  if(!confirm('삭제할까요?'))return;
  showLoading(true);
  try{
    const res=await fetch(API, {method:'POST', body:new URLSearchParams({action:'delete', id})});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    rests=rests.filter(r=>r.id!==id);
    closeM('dov');render();toast('삭제 완료','ok');
  }catch(e){
    toast('삭제 실패: '+e.message,'err');
  }finally{
    showLoading(false);
  }
}


// ── CATEGORY ──────────────────────────────────────
function selCat(el){
  document.querySelectorAll('.catb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); selCatVal=el.dataset.cat;
}

// ── PHONE FORMAT (02 / 0[3-9]X / 070 / 010 모두 처리) ──
function fmtPhone(el){
  let v=el.value.replace(/\D/g,'');
  if(v.startsWith('02')){
    // 서울 02: 02-XXX-XXXX or 02-XXXX-XXXX
    if(v.length<=5)      el.value=v.length>2?`${v.slice(0,2)}-${v.slice(2)}`:v;
    else if(v.length<=9) el.value=`${v.slice(0,2)}-${v.slice(2,5)}-${v.slice(5)}`;
    else                 el.value=`${v.slice(0,2)}-${v.slice(2,6)}-${v.slice(6,10)}`;
  } else if(v.startsWith('070')){
    // 인터넷전화 070-XXXX-XXXX
    if(v.length<=6)       el.value=v.length>3?`${v.slice(0,3)}-${v.slice(3)}`:v;
    else if(v.length<=10) el.value=`${v.slice(0,3)}-${v.slice(3,7)}-${v.slice(7)}`;
    else                  el.value=`${v.slice(0,3)}-${v.slice(3,7)}-${v.slice(7,11)}`;
  } else {
    // 010, 011, 016~019, 0XX 지역번호 등 — 3-3-4 or 3-4-4
    if(v.length<=6)       el.value=v.length>3?`${v.slice(0,3)}-${v.slice(3)}`:v;
    else if(v.length<=10) el.value=`${v.slice(0,3)}-${v.slice(3,6)}-${v.slice(6)}`;
    else                  el.value=`${v.slice(0,3)}-${v.slice(3,7)}-${v.slice(7,11)}`;
  }
}

// ── 영업시간 시간표 ────────────────────────────────
const todayIdx=(new Date().getDay()+6)%7; // 월=0

function buildHtGrid(){
  /* ── PC 그리드 ── */
  const el=document.getElementById('htGrid');
  if(el){
    const dayHdrs=DAYS.map((d,i)=>{
      let cls='ht-cell day-hdr';
      if(i===5)cls+=' sat'; if(i===6)cls+=' sun'; if(i===todayIdx)cls+=' today-hdr';
      return`<div class="${cls}">${d}</div>`;
    }).join('');
    const openCells=DK.map((k,i)=>`
      <div class="ht-input-cell${i===todayIdx?' today':''}" id="htoc_${k}">
        <input type="time" class="ht-time" id="ho_${k}" value="11:00">
      </div>`).join('');
    const closeCells=DK.map((k,i)=>`
      <div class="ht-input-cell${i===todayIdx?' today':''}" id="htcc_${k}">
        <input type="time" class="ht-time" id="hc_${k}" value="21:00">
      </div>`).join('');
    const offCells=DK.map((k,i)=>`
      <div class="ht-off-cell${i===todayIdx?' today':''}" id="htoff_${k}">
        <button class="ht-off-btn" id="hoff_${k}" onclick="togOff('${k}')">휴무</button>
      </div>`).join('');
    el.innerHTML=
      `<div class="ht-cell ht-hdr"></div>${dayHdrs}`+
      `<div class="ht-label">시작</div>${openCells}`+
      `<div class="ht-label">종료</div>${closeCells}`+
      `<div class="ht-label" style="font-size:10px">휴무</div>${offCells}`;
  }

  /* ── 모바일 카드 ── */
  const mc=document.getElementById('htCards');
  if(mc){
    mc.innerHTML=DAYS.map((d,i)=>{
      const k=DK[i];
      let dayCls='ht-card-day';
      if(i===5)dayCls+=' sat'; if(i===6)dayCls+=' sun'; if(i===todayIdx)dayCls+=' today';
      return`<div class="ht-card" id="mc_${k}">
        <span class="${dayCls}">${d}</span>
        <input type="time" class="ht-card-time" id="mho_${k}" value="11:00">
        <input type="time" class="ht-card-time" id="mhc_${k}" value="21:00">
        <button class="ht-card-off" id="moff_${k}" onclick="togOff('${k}')">휴무</button>
      </div>`;
    }).join('');
  }
}

function togOff(k){
  // PC
  const btn=document.getElementById(`hoff_${k}`);
  if(btn){
    const isOff=btn.classList.toggle('active');
    const ho=document.getElementById(`ho_${k}`);
    const hc=document.getElementById(`hc_${k}`);
    if(ho)ho.disabled=isOff; if(hc)hc.disabled=isOff;
  }
  // 모바일
  const mbtn=document.getElementById(`moff_${k}`);
  if(mbtn){
    const isOff2=mbtn.classList.toggle('active');
    const mho=document.getElementById(`mho_${k}`);
    const mhc=document.getElementById(`mhc_${k}`);
    if(mho)mho.disabled=isOff2; if(mhc)mhc.disabled=isOff2;
    const card=document.getElementById(`mc_${k}`);
    if(card)card.classList.toggle('off-day',isOff2);
  }
}

function setOff(k,off){
  // PC
  const btn=document.getElementById(`hoff_${k}`);
  if(btn){
    if(off)btn.classList.add('active'); else btn.classList.remove('active');
    const ho=document.getElementById(`ho_${k}`);
    const hc=document.getElementById(`hc_${k}`);
    if(ho)ho.disabled=off; if(hc)hc.disabled=off;
  }
  // 모바일
  const mbtn=document.getElementById(`moff_${k}`);
  if(mbtn){
    if(off)mbtn.classList.add('active'); else mbtn.classList.remove('active');
    const mho=document.getElementById(`mho_${k}`);
    const mhc=document.getElementById(`mhc_${k}`);
    if(mho)mho.disabled=off; if(mhc)mhc.disabled=off;
    const card=document.getElementById(`mc_${k}`);
    if(card)card.classList.toggle('off-day',off);
  }
}

function setTime(k,o,c){
  // PC
  const ho=document.getElementById(`ho_${k}`);
  const hc=document.getElementById(`hc_${k}`);
  if(ho)ho.value=o; if(hc)hc.value=c;
  // 모바일
  const mho=document.getElementById(`mho_${k}`);
  const mhc=document.getElementById(`mhc_${k}`);
  if(mho)mho.value=o; if(mhc)mhc.value=c;
}

function apAll(o,c){
  DK.forEach(k=>{setOff(k,false);setTime(k,o,c);});
  toast('전체 요일 적용','ok');
}

function apOffWeekend(sunOnly){
  apAll('11:00','21:00');
  const targets=sunOnly?['sun']:['sat','sun'];
  targets.forEach(k=>setOff(k,true));
  toast(sunOnly?'일요일 휴무 설정':'주말 휴무 설정','ok');
}

function apOffWed(){
  apAll('11:00','21:00');
  setOff('wed',true);
  toast('수요일 휴무 설정','ok');
}

function getHours(){
  const h={};
  DK.forEach(k=>{
    // PC가 보이면 PC값, 모바일이 보이면 모바일값 우선
    const pcOff=document.getElementById(`hoff_${k}`);
    const mOff=document.getElementById(`moff_${k}`);
    const isMobile=window.innerWidth<560;
    if(isMobile&&mOff){
      const off=mOff.classList.contains('active');
      h[k]=off?'휴무':`${document.getElementById(`mho_${k}`).value}-${document.getElementById(`mhc_${k}`).value}`;
    } else if(pcOff){
      const off=pcOff.classList.contains('active');
      h[k]=off?'휴무':`${document.getElementById(`ho_${k}`).value}-${document.getElementById(`hc_${k}`).value}`;
    }
  });
  return h;
}

function resetHours(){
  DK.forEach(k=>{setOff(k,false);setTime(k,'11:00','21:00');});
}

// ── PHOTO ─────────────────────────────────────────
function addPhotos(e){
  Array.from(e.target.files).slice(0,6-photos.length).forEach(f=>{
    compressImg(f, dataUrl=>{photos.push(dataUrl);renderPrev();});
  });
}

function compressImg(file, cb){
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const MAX=800;
    let w=img.width, h=img.height;
    if(w>MAX||h>MAX){
      if(w>h){h=Math.round(h*MAX/w);w=MAX;}
      else{w=Math.round(w*MAX/h);h=MAX;}
    }
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg', 0.72));
    URL.revokeObjectURL(url);
  };
  img.src=url;
}
function renderPrev(){
  document.getElementById('pprev').innerHTML=photos.map((d,i)=>`
    <div class="ppw"><img class="pp" src="${d}"><button class="ppr" onclick="rmPhoto(${i})">✕</button></div>`).join('');
}
function rmPhoto(i){photos.splice(i,1);renderPrev();}

// ── EDIT ──────────────────────────────────────────
let editingId = null;

function openEdit(id){
  const x=rests.find(r=>r.id===id); if(!x)return;
  editingId=id;
  closeM('dov');

  // 폼 채우기
  document.getElementById('rName').value=x.name||'';
  document.getElementById('rAddr').value=x.address||'';
  document.getElementById('rAddrDetail').value=x.addrDetail||'';
  document.getElementById('rPhone').value=x.phone||'';
  document.getElementById('rMemo').value=x.memo||'';

  // 카테고리
  document.querySelectorAll('.catb').forEach(b=>b.classList.remove('on'));
  const cb=document.querySelector(`.catb[data-cat="${x.category}"]`);
  if(cb){cb.classList.add('on');selCatVal=x.category;}

  // 영업시간
  resetHours();
  if(x.hours){
    DK.forEach(k=>{
      const t=x.hours[k];
      if(!t)return;
      if(t==='휴무'){setOff(k,true);}
      else if(t.includes('-')){
        const pts=t.split('-');
        if(pts.length===2){setOff(k,false);setTime(k,pts[0],pts[1]);}
      }
    });
  }

  // 사진
  photos=[...(x.photos||[])]; renderPrev();

  // 타이틀과 버튼 텍스트 변경
  document.querySelector('#rov .mhdr h2').textContent='맛집 수정';
  document.querySelector('.sbtn').textContent='수정 완료 ✓';
  openM('rov');
}

async function submitEdit(){
  const name=document.getElementById('rName').value.trim();
  const addr=document.getElementById('rAddr').value.trim();
  if(!name){toast('식당 이름을 입력해주세요','err');return;}
  if(!addr){toast('주소를 입력해주세요','err');return;}
  const hours=getHours();
  const sbtn=document.querySelector('.sbtn');
  sbtn.disabled=true; sbtn.textContent='수정 중...';
  showLoading(true);
  try{
    const body={
      action:'update', id:editingId, name, category:selCatVal, address:addr,
      addrDetail:document.getElementById('rAddrDetail').value.trim(),
      phone:document.getElementById('rPhone').value.trim(),
      ...hours,
      photos:JSON.stringify(photos),
      memo:document.getElementById('rMemo').value.trim()
    };
    const res=await fetch(API, {method:'POST',body:new URLSearchParams(body)});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    // 로컬 업데이트
    const idx=rests.findIndex(r=>r.id===editingId);
    if(idx>-1){
      rests[idx]={...rests[idx],name,category:selCatVal,address:addr,
        addrDetail:document.getElementById('rAddrDetail').value.trim(),
        phone:document.getElementById('rPhone').value.trim(),
        hours,photos:[...photos],
        memo:document.getElementById('rMemo').value.trim()};
    }
    editingId=null;
    closeM('rov'); render();
    toast(`"${name}" 수정 완료!`,'ok');
  }catch(e){
    toast('수정 실패: '+e.message,'err');
  }finally{
    sbtn.disabled=false;
    sbtn.textContent='등록하기 ✓';
    showLoading(false);
  }
}

// ── REGISTER ──────────────────────────────────────
function openReg(){
  editingId=null;
  ['rName','rAddr','rAddrDetail','rPhone','rMemo'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  photos=[];renderPrev();
  document.querySelectorAll('.catb').forEach(b=>b.classList.remove('on'));
  document.querySelector('.catb[data-cat="korean"]').classList.add('on');
  selCatVal='korean';
  resetHours();
  // 타이틀/버튼 원복
  document.querySelector('#rov .mhdr h2').textContent='맛집 등록';
  document.querySelector('.sbtn').textContent='등록하기 ✓';
  openM('rov');
}

async function submitReg(){
  const name=document.getElementById('rName').value.trim();
  const addr=document.getElementById('rAddr').value.trim();
  if(!name){toast('식당 이름을 입력해주세요','err');return;}
  if(!addr){toast('주소를 입력해주세요','err');return;}
  const hours=getHours();
  const sbtn=document.querySelector('.sbtn');
  sbtn.disabled=true; sbtn.textContent='등록 중...';
  showLoading(true);
  try{
    const body={
      action:'add', name, category:selCatVal, address:addr,
      addrDetail:document.getElementById('rAddrDetail').value.trim(),
      phone:document.getElementById('rPhone').value.trim(),
      ...hours,
      photos:JSON.stringify(photos),
      memo:document.getElementById('rMemo').value.trim()
    };
    const res=await fetch(API, {method:'POST',body:new URLSearchParams(body)});
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    // 로컬에도 추가해서 즉시 반영
    rests.unshift({id:data.id,name,category:selCatVal,address:addr,
      addrDetail:document.getElementById('rAddrDetail').value.trim(),
      phone:document.getElementById('rPhone').value.trim(),
      hours,photos:[...photos],
      memo:document.getElementById('rMemo').value.trim()});
    closeM('rov'); render();
    toast(`"${name}" 등록 완료!`,'ok');
  }catch(e){
    toast('등록 실패: '+e.message,'err');
  }finally{
    sbtn.disabled=false; sbtn.textContent='등록하기 ✓';
    showLoading(false);
  }
}

// ── UTILS ─────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function openM(id){document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}
let _tt;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} on`;
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2600);
}
</script>
</body>
</html>
